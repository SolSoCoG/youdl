{{define "layout"}}<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>youdl - YouTube Downloader</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0f0f0f; color: #e1e1e1; min-height: 100vh; }
        .container { max-width: 720px; margin: 0 auto; padding: 2rem 1rem; }
        h1 { font-size: 1.8rem; margin-bottom: 1.5rem; }
        h1 a { color: #ff4444; text-decoration: none; }
        .card { background: #1a1a1a; border-radius: 12px; padding: 1.5rem; margin-bottom: 1rem; }
        input[type="text"], input[type="url"], input[type="number"] { width: 100%; padding: 0.75rem 1rem; border: 1px solid #333; border-radius: 8px; background: #252525; color: #e1e1e1; font-size: 1rem; }
        input:focus { outline: none; border-color: #ff4444; }
        button, .btn { display: inline-block; padding: 0.75rem 1.5rem; border: none; border-radius: 8px; background: #ff4444; color: #fff; font-size: 1rem; cursor: pointer; text-decoration: none; }
        button:hover, .btn:hover { background: #cc3333; }
        .btn-secondary { background: #333; }
        .btn-secondary:hover { background: #444; }
        select { padding: 0.5rem; border-radius: 6px; background: #252525; color: #e1e1e1; border: 1px solid #333; font-size: 0.9rem; }
        .status { display: inline-block; padding: 0.25rem 0.75rem; border-radius: 20px; font-size: 0.85rem; font-weight: 600; }
        .status-pending { background: #333; color: #aaa; }
        .status-ready { background: #1a3a1a; color: #4caf50; }
        .status-queued { background: #3a3a1a; color: #ff9800; }
        .status-running { background: #1a2a3a; color: #2196f3; }
        .status-done { background: #1a3a1a; color: #4caf50; }
        .status-failed { background: #3a1a1a; color: #f44336; }
        .formats-table { width: 100%; border-collapse: collapse; margin: 1rem 0; }
        .formats-table th, .formats-table td { padding: 0.5rem; text-align: left; border-bottom: 1px solid #333; }
        .formats-table th { color: #888; font-size: 0.85rem; }
        .form-group { margin-bottom: 1rem; }
        label { display: block; margin-bottom: 0.5rem; color: #aaa; font-size: 0.9rem; }
        .spinner { display: inline-block; width: 18px; height: 18px; border: 2px solid #333; border-top-color: #ff4444; border-radius: 50%; animation: spin 0.8s linear infinite; vertical-align: middle; margin-right: 0.5rem; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .error { color: #f44336; margin-top: 0.5rem; }
    </style>
</head>
<body>
    <div class="container">
        <h1><a href="/">youdl</a></h1>
        {{template "content" .}}
    </div>
</body>
</html>{{end}}
